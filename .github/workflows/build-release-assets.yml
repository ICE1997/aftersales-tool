name: Build & attach release assets (manual)

# 手动:为某个已存在的 Release tag 构建双平台安装包并上传到该 Release。
# 用途:补传(如某次自动发布的上传步骤失败),或对历史 tag 重新出包。
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "已存在的 Release tag(例如 v0.2.4)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (no publish)
        run: npm run dist -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installers to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=()
          for f in dist/*.exe dist/*.dmg dist/*.blockmap dist/latest*.yml; do
            [ -f "$f" ] && files+=("$f")
          done
          if [ ${#files[@]} -eq 0 ]; then echo "no installer artifacts found in dist/" >&2; exit 1; fi
          gh release upload "${{ inputs.tag }}" "${files[@]}" --clobber
