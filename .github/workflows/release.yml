name: Release (tag)

# 推送 vX.Y.Z tag 时：先跑测试 → 各平台并行构建产物 → 单个 job 汇总创建“一个”
# Release（直接发布,非草稿）。单次发布调用,杜绝重复 Release。
# 发布流程：改 package.json version → 提交 → 打同名 tag vX.Y.Z（须与 version 一致）
#           → git push --tags → 测试通过后自动构建并发布。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 阶段 0：测试门禁 —— 测试不过则不构建、不发布。
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Test
        run: npm test

  # 阶段 1：并行在各平台构建产物（--publish never），上传为 workflow artifact。
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # electron-vite build + electron-builder（按宿主 OS 选 nsis / dmg）。
      # --publish never：只构建,latest(-mac).yml 仍会写入 dist/，但不上传。
      - name: Build (no publish)
        run: npm run dist -- --publish never
        env:
          # 关闭 mac 代码签名发现（未签名构建；与 package.json identity:null 一致）。
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.blockmap
            dist/latest.yml
            dist/latest-mac.yml
          if-no-files-found: ignore
          retention-days: 7

  # 阶段 2：下载两个平台的产物,单次创建“一个”Release(直接发布,自动生成发布说明)。
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Publish single GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          make_latest: true
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: artifacts/**/*
          fail_on_unmatched_files: true
