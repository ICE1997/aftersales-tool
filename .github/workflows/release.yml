name: Release (tag)

# 推送 vX.Y.Z tag 时，在 Windows + macOS 上构建并发布到该 tag 的 GitHub Release。
# 发布流程：改 package.json version → 提交 → 打同名 tag vX.Y.Z（须与 version 一致）
#           → git push --tags → 本 workflow 自动构建并发布。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    strategy:
      fail-fast: false
      # Serialize the platform builds: electron-builder publishes a DRAFT release,
      # and GitHub's get-release-by-tag API doesn't return drafts — so parallel jobs
      # each create their own draft (two releases). Running one at a time lets the
      # second job find and append to the first job's draft → a single release.
      max-parallel: 1
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # electron-vite build（含 TS 检查）+ electron-builder（按宿主 OS 选 nsis / dmg）
      # --publish always：把安装包与 latest(-mac).yml 更新清单发布到该 tag 的 Release。
      - name: Build & publish
        run: npm run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 关闭 mac 代码签名发现（未签名构建；与 package.json identity:null 一致）。
          CSC_IDENTITY_AUTO_DISCOVERY: false
