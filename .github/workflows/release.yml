name: Release

# release-please 驱动：推 feat:/fix: 到 main → release-please 维护一个「release PR」
# (自动 bump 版本 + 更新 CHANGELOG.md)。合并该 PR → release-please 打 tag 并创建正式
# Release(非草稿,含 changelog 说明)→ 本工作流的 build 阶段构建双平台安装包并上传到该 Release。
# 不再需要手动改版本号 / 手动打 tag。
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 维护 release PR;PR 合并时创建 tag + 正式 Release,并置 release_created=true。
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp

  # 仅当本次 push 触发了一次实际发布(release PR 被合并)时,才测试 + 构建 + 上传。
  test:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test

  build:
    needs: [release-please, test]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Build (no publish)
        run: npm run dist -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # 把本平台产物上传到 release-please 已创建的那个 Release(两平台都上传到同一个,
      # Release 已存在 → 不可能重复)。只上传实际存在的文件(各平台产物不同)。
      - name: Upload installers to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=()
          for f in dist/*.exe dist/*.dmg dist/*.blockmap dist/latest*.yml; do
            [ -f "$f" ] && files+=("$f")
          done
          if [ ${#files[@]} -eq 0 ]; then echo "no installer artifacts found in dist/" >&2; exit 1; fi
          gh release upload "${{ needs.release-please.outputs.tag_name }}" "${files[@]}" --clobber
