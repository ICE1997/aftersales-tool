name: Build Windows (x64)

# 手动触发：在 GitHub 仓库的 Actions 标签页选择此 workflow，点 "Run workflow"。
# 在 windows-latest runner 上原生打包，原生模块（better-sqlite3 / sharp / ffmpeg-static）
# 直接以 Windows x64 的预编译产物安装，无需任何交叉编译。
on:
  workflow_dispatch:

# 同一分支重复触发时，取消上一次仍在跑的构建。
concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # npm ci 会按宿主平台（win32-x64）安装 sharp 的 @img/sharp-win32-x64，
      # 并触发 ffmpeg-static 的 postinstall 下载 ffmpeg.exe。
      - name: Install dependencies
        run: npm ci

      # electron-vite build（含 TS 类型检查）+ electron-builder 打 NSIS。
      # electron-builder 会自动用 @electron/rebuild 把 better-sqlite3 重编到
      # Electron 的 ABI，因此无需手动跑 rebuild:electron。
      - name: Build & package (NSIS, x64)
        # --publish never: just build the installer; the artifact is uploaded below.
        # (electron-builder otherwise infers a GitHub publish provider from the repo
        # remote and fails on CI without GH_TOKEN.)
        run: npm run dist -- --win nsis --x64 --publish never
        env:
          # 关闭代码签名（与 package.json 默认一致，避免 CI 上找签名证书失败）。
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer
        uses: actions/upload-artifact@v5
        with:
          name: shouhou-jiang-win-x64
          # NSIS 安装包及其 blockmap/latest.yml 均在 dist/ 下。
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error
          retention-days: 14
